name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main  # Defina a branch principal do seu repositório

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true  # Busca temas do Hugo como submódulos
          fetch-depth: 0    # Busca todo o histórico para publicações Git

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
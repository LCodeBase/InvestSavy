# Site settings
title: InvestSavy - Gestão Financeira Inteligente
email: invest.smart.sup.braslandia@gmail.com
description: >-
  Plataforma completa para gestão financeira pessoal que combina organização prática com insights inteligentes para otimizar suas finanças. Oferecemos ferramentas para gestão financeira, recomendações de investimentos e conteúdo educacional.
baseurl: '/InvestSavy'
url: 'https://lcodebase.github.io'
lang: 'pt-BR'
author: 'InvestSavy Team'

# Build settings
markdown: kramdown
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Exclude files from processing
exclude:
  - node_modules
  - package.json
  - package-lock.json
  - .git
  - .github
  - .vscode
  - dist
  - tsconfig.json
  - vite.config.ts
  - tailwind.config.js

# Pagination settings
paginate: 6
paginate_path: '/blog/page:num/'

# Collections
collections:
  posts:
    output: true
    permalink: /:categories/:title/

# Default front matter
defaults:
  - scope:
      path: ''
      type: 'posts'
    values:
      layout: 'post'
      author: 'InvestSavy Team'
